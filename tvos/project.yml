name: KidsTube
options:
  bundleIdPrefix: com.kidstube
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  KidsTube:
    type: application
    platform: tvOS
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kidstube.app
        TARGETED_DEVICE_FAMILY: 3
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

  KidsTubeTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - Tests
    dependencies:
      - target: KidsTube
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kidstube.tests
        GENERATE_INFOPLIST_FILE: "YES"
