services:
  # === Invidious (YouTube proxy + API) ===
  invidious:
    image: quay.io/invidious/invidious:latest
    restart: unless-stopped
    environment:
      INVIDIOUS_CONFIG: |
        db:
          dbname: invidious
          user: kemal
          password: ${INVIDIOUS_DB_PASSWORD:-kemal}
          host: invidious-db
          port: 5432
        check_tables: true
        local: true
        external_port: 3000
        domain: localhost
        https_only: false
        invidious_companion:
          - private_url: http://companion:8282
    ports:
      - "3000:3000"
    depends_on:
      - invidious-db
      - companion
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - brg

  invidious-db:
    image: docker.io/library/postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: invidious
      POSTGRES_USER: kemal
      POSTGRES_PASSWORD: ${INVIDIOUS_DB_PASSWORD:-kemal}
    volumes:
      - invidious-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kemal -d invidious"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brg

  companion:
    image: quay.io/invidious/invidious-companion:latest
    restart: unless-stopped
    environment:
      - SERVER_SECRET_KEY=${INVIDIOUS_COMPANION_SECRET:-change_me_companion}
    networks:
      - brg

  # === BrainRotGuard Server ===
  brainrotguard:
    build: ./server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BRG_APP_NAME=${BRG_APP_NAME:-KidsTube}
      - BRG_BOT_TOKEN=${BRG_BOT_TOKEN}
      - BRG_ADMIN_CHAT_ID=${BRG_ADMIN_CHAT_ID}
      - BRG_API_KEY=${BRG_API_KEY}
      - BRG_BASE_URL=${BRG_BASE_URL:-}
      - BRG_INVIDIOUS_URL=http://invidious:3000
      - BRG_TIMEZONE=${BRG_TIMEZONE:-America/New_York}
      - BRG_WEB_PORT=8080
      - BRG_DAILY_LIMIT_MINUTES=${BRG_DAILY_LIMIT_MINUTES:-120}
    volumes:
      - brg-db:/app/db
    depends_on:
      invidious:
        condition: service_healthy
    networks:
      - brg

  # === atvloadly (Apple TV sideloader) ===
  atvloadly:
    image: ghcr.io/bitxeno/atvloadly:latest
    privileged: true
    restart: unless-stopped
    ports:
      - "5533:80"
    volumes:
      - atvloadly-data:/data
      - /var/run/dbus:/var/run/dbus
      - /var/run/avahi-daemon:/var/run/avahi-daemon
    networks:
      - brg

volumes:
  invidious-db:
  brg-db:
  atvloadly-data:

networks:
  brg:
    driver: bridge
