name: Build tvOS App

on:
  push:
    branches: [main]
    paths:
      - 'tvos/**'
      - '.github/workflows/tvos-build.yml'
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'tvos/**'
      - '.github/workflows/tvos-build.yml'
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL (e.g., https://kidstube.example.com)'
        required: false
      api_key:
        description: 'API key (leave blank to use repository secret)'
        required: false

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Secrets.xcconfig
        env:
          INPUT_SERVER_URL: ${{ inputs.server_url }}
          SECRET_SERVER_URL: ${{ secrets.BRG_SERVER_URL }}
          INPUT_API_KEY: ${{ inputs.api_key }}
          SECRET_API_KEY: ${{ secrets.BRG_API_KEY }}
        run: |
          SERVER_URL="${INPUT_SERVER_URL:-$SECRET_SERVER_URL}"
          API_KEY="${INPUT_API_KEY:-$SECRET_API_KEY}"

          # Use placeholder if nothing is configured — app falls back to localhost
          cat > tvos/Secrets.xcconfig << XCEOF
          BRG_SERVER_URL = ${SERVER_URL:-http:/\$()/localhost:8080}
          BRG_API_KEY = ${API_KEY:-}
          XCEOF

      - name: Generate Xcode project
        run: cd tvos && xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project tvos/KidsTube.xcodeproj \
            -scheme KidsTube \
            -destination "generic/platform=tvOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          mv build/KidsTube.app build/Payload/
          cd build && zip -r KidsTube.ipa Payload

      - name: Upload Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: KidsTube-tvOS
          path: build/KidsTube.ipa
          retention-days: 30

      - name: Attach IPA to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/KidsTube.ipa

  test-server:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: cd server && pytest -v

  test-swift:
    runs-on: macos-15
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Run Swift tests
        run: cd tvos && swift test
